<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #100202;
    --paper: #FBEFD9;
    --red: #D30B00;
    --border: rgba(16,2,2,0.12);
    --card-bg: #fff;
    --body-bg: #f4f0e8;
    --core-bg: #fff9f2;
    --core-border: #D30B00;
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--body-bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 32px 80px;
  }

  /* ===== HEADER ===== */
  .site-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .site-header h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 48px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .site-header h1 em { color: var(--red); font-style: italic; }

  .site-header p {
    font-size: 16px;
    color: #444444;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ===== FILTERS ===== */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 40px;
  }

  .filter-btn {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    color: rgba(16,2,2,0.6);
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--red); color: var(--red); }
  .filter-btn.active { background: var(--ink); color: #FBEFD9; border-color: var(--ink); }

  /* ===== SECTION HEADERS ===== */
  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 16px;
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(211,11,0,0.20);
  }

  /* ===== CORE SECTION BOX ===== */
  .core-box {
    border: 2px solid var(--red);
    border-radius: 16px;
    background: var(--core-bg);
    padding: 24px;
    margin-bottom: 8px;
    position: relative;
  }

  .core-box-label {
    position: absolute;
    top: -12px;
    left: 20px;
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: 100px;
  }

  /* ===== GRID ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .core-box .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }

  /* ===== STYLE CARD ===== */
  .style-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    position: relative;
  }

  .style-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(16,2,2,0.12);
    border-color: rgba(16,2,2,0.25);
  }

  .style-card.selected {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(211,11,0,0.15), 0 8px 28px rgba(211,11,0,0.12);
  }

  /* Number badge */
  .card-num {
    display: inline-block;
    font-size: 16px;
    font-weight: 800;
    color: var(--red);
    letter-spacing: 0.04em;
    margin-right: 5px;
    vertical-align: middle;
    line-height: 1;
  }

  .style-card.selected .card-num {
    color: var(--red);
  }

  /* Swatch strip */
  .swatch-strip {
    display: flex;
    height: 52px;
    width: 100%;
  }

  .swatch {
    flex: 1;
    height: 100%;
    transition: flex 0.2s;
  }

  .style-card:hover .swatch { flex: 1.15; }
  .style-card:hover .swatch:first-child { flex: 1.4; }

  /* Card body */
  .card-body {
    padding: 14px 16px 16px;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .card-tagline {
    font-size: 12px;
    color: #444444;
    line-height: 1.45;
    margin-bottom: 8px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .card-tag {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 100px;
    background: rgba(16,2,2,0.06);
    color: #555555;
    text-transform: uppercase;
  }

  /* Scheme indicator */
  .scheme-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .scheme-dot.dark  { background: #100202; }
  .scheme-dot.light { background: #d4c9b0; border: 1px solid #a09880; }
  .scheme-dot.mixed { background: linear-gradient(90deg, #100202 50%, #d4c9b0 50%); border: 1px solid #a09880; }

  /* Scheme + Formality rows */
  .meta-rows {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .meta-key {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: #666666;
    width: 62px;
    flex-shrink: 0;
  }

  .meta-val {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #444444;
  }

  .form-bar {
    flex: 1;
    height: 3px;
    background: rgba(16,2,2,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .form-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ===== SELECTION BANNER ===== */
  .selection-banner {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    transform: translateX(-50%) translateY(12px);
    white-space: nowrap;
    z-index: 100;
  }

  .selection-banner.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }

  .banner-accent { color: #FCA311; }

  /* ===== HIDDEN CARD ===== */
  .style-card.hidden { display: none; }

// =====================================================
// RENDER CARDS
// =====================================================
function formalityWidth(f) {
  return { "low": "25%", "medium-low": "38%", "medium": "52%", "medium-high": "68%", "high": "88%" }[f] || "52%";
}

function makeCard(s) {
  const card = document.createElement('div');
  card.className = 'style-card';
  card.dataset.id   = s.id;
  card.dataset.group = s.group;
  card.dataset.scheme = s.scheme;
  card.dataset.formality = s.formality;
  card.dataset.tags = s.tags.join(' ').toLowerCase();
  card.dataset.name = s.name.toLowerCase();

  const swatches = s.colors.map(c =>
    `<div class="swatch" style="background:${c};"></div>`
  ).join('');

  const tags = s.tags.slice(0,3).map(t =>
    `<span class="card-tag">${t}</span>`
  ).join('');

  const subtitle = s.subtitle ? ` <small style="font-weight:400;color:#555555;font-size:12px;">— ${s.subtitle}</small>` : '';

  const schemeDot = `<span class="scheme-dot ${s.scheme}"></span>`;

  card.innerHTML = `
    <div class="swatch-strip">${swatches}</div>
    <div class="card-body">
      <div class="card-name"><span class="card-num">#${s.id}</span>${s.name}${subtitle}</div>
      <div class="card-tagline">${s.tagline}</div>
      <div class="card-tags">${tags}</div>
      <div class="meta-rows">
        <div class="meta-row">
          <div class="meta-key">Scheme</div>
          <div class="meta-val">${schemeDot}${s.scheme}</div>
        </div>
        <div class="meta-row">
          <div class="meta-key">Formality</div>
          <div class="form-bar"><div class="form-fill" style="width:${formalityWidth(s.formality)};"></div></div>
          <div class="meta-val">${s.formality}</div>
        </div>
      </div>
    </div>`;

  card.addEventListener('click', () => selectCard(card, s));
  return card;
}

// Render into sections
const coreGrid    = document.getElementById('core-grid');
const additionalGrid = document.getElementById('additional-grid');

STYLES.forEach(s => {
  const card = makeCard(s);
  if (s.group === 'core')   coreGrid.appendChild(card);
  else additionalGrid.appendChild(card);
});

// =====================================================
// SELECTION
// =====================================================
let selectedId = null;

function selectCard(card, s) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedId = s.id;

  const banner = document.getElementById('selectionBanner');
  document.getElementById('bannerText').textContent = `#${s.id} · ${s.name}`;
  banner.classList.add('show');

  setTimeout(() => { if (selectedId === s.id) banner.classList.remove('show'); }, 4000);
}

// =====================================================
// FILTERING
// =====================================================
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const f = btn.dataset.filter;
  const all = document.querySelectorAll('.style-card');

  all.forEach(card => {
    let show = true;
    if      (f === 'all')      show = true;
    else if (f === 'core')     show = card.dataset.group === 'core';
    else if (f === 'dark')     show = card.dataset.scheme === 'dark';
    else if (f === 'light')    show = card.dataset.scheme === 'light';
    else if (f === 'mixed')    show = card.dataset.scheme === 'mixed';
    else if (f === 'high')     show = card.dataset.formality === 'high';
    else if (f === 'low')      show = ['low','medium-low'].includes(card.dataset.formality);
    else if (f === 'editorial')show = /editorial|literary|broadside|paper|vellum|soft|biennale|cobalt|cartesian/i.test(card.dataset.name + ' ' + card.dataset.tags);
    else if (f === 'playful')  show = /playful|daisy|scatterbrain|sakura|retro|capsule|split pastel|pastel|daisy|blockframe/i.test(card.dataset.name + ' ' + card.dataset.tags);
    else if (f === 'tech')     show = /developer|gaming|terminal|cyber|hacker|8-bit|web3|hackathon|CLI|developer/i.test(card.dataset.name + ' ' + card.dataset.tags);

    card.classList.toggle('hidden', !show);
  });

  // Hide/show section wrappers when all their cards are filtered out
  const coreBox   = document.querySelector('.core-box');
  const coreLabel = coreBox.previousElementSibling;
  const coreVisible = document.querySelectorAll('#core-grid .style-card:not(.hidden)').length > 0;
  coreBox.style.display   = coreVisible ? '' : 'none';
  coreLabel.style.display = coreVisible ? '' : 'none';

  const addGrid  = document.getElementById('additional-grid');
  const addLabel = document.getElementById('additional-label');
  const addVisible = document.querySelectorAll('#additional-grid .style-card:not(.hidden)').length > 0;
  addGrid.style.display  = addVisible ? '' : 'none';
  addLabel.style.display = addVisible ? '' : 'none';
});
</script>
